<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Event Flyer</title>
    <style>
     body {
      padding: 50px 0; 
      margin: 0 auto;
      width: 80vw;
      min-height: calc(100vh - 100px);
      background-color: #f4f4f4;
      font-family: sans-serif;
      text-align: center;
      }

      header img {
          max-width: 100%;
          height: auto;
          border-radius: 10px;
      }

      hr {
          width: 50%;
          margin: 20px auto;
      }

      section {
          width: 90%;
          margin: 20px auto;
          background: white;
          padding: 10px;
          border-radius: 8px;
      }

      h1, h2 {
          color: #333;
      }
    </style>
</head>
<body>
    <header>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/event.jpg" alt="Event Banner">
        <h1>Annual Summer Jazz Festival</h1>
    </header>

    <hr>

    <main>
        <section>
            <h2>Live Performances</h2>
            <p>Experience world-class musicians under the stars.</p>
        </section>

        <section>
            <h2>Gourmet Food</h2>
            <p>Enjoy local delicacies from the city's best food trucks.</p>
        </section>
    </main>
</body>
</html>
