<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feature Selection</title>
  <link rel="stylesheet" href="styles.css">
  <style>
   body {
     font-family: Arial, sans-serif;
     background-color: #f5f7fb;
     text-align: center;
     padding: 30px;
   }

   h1 {
     margin-bottom: 30px;
   }

   .feature-card-container {
     display: flex;
     justify-content: center;
     gap: 20px;
     flex-wrap: wrap;
   }

   .feature-card {
     display: flex;
     align-items: center;
     gap: 10px;
     background: white;
     padding: 15px 20px;
     border-radius: 10px;
     cursor: pointer;
     box-shadow: 0 4px 10px rgba(0,0,0,0.1);
     font-size: 16px;
   }

   .feature-card input[type="checkbox"] {
     appearance: none;
     width: 20px;
     height: 20px;
     border: 2px solid #555;
     border-radius: 5px;
     position: relative;
     cursor: pointer;
   }

   .feature-card input[type="checkbox"]:checked {
     background-color: #4CAF50;
     border-color: #4CAF50;
   }

   .feature-card input[type="checkbox"]:checked::after {
     content: "✓";
     color: white;
     font-size: 14px;
     position: absolute;
     top: 50%;
     left: 50%;
     transform: translate(-50%, -50%);
   }
  </style>
</head>
<body>

  <h1>Feature Selection</h1>

  <div class="feature-card-container">
    
    <label class="feature-card">
      <input type="checkbox">
      Dark Mode
    </label>

    <label class="feature-card">
      <input type="checkbox">
      Notifications
    </label>

    <label class="feature-card">
      <input type="checkbox">
      Auto Backup
    </label>

  </div>

</body>
</html>
