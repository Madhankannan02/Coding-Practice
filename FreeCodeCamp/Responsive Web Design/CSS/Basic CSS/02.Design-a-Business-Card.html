<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Business Card</title>
    <link href="styles.css" rel="stylesheet" />

    <style>
     body{
      background: rosybrown;
      font-family:Arial, sans-serif; 
    }

    .business-card {
      width: 300px;
      background-color: white;
      padding: 20px;
      margin-top: 100px;
      text-align: center;
      font-size: 16px;
      margin-left: auto;
      margin-right: auto;
    }

    .profile-image{
      max-width: 100%;
    }

    p{
      margin: 5px;
    }

    a{
      text-decoration: none;
    }
    </style>

</head>

<body>
    <div class="business-card">
        <img class="profile-image" src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" alt="flower" />
        <p class="full-name">Your Name</p>
        <p class="designation">Designation</p>
        <p class="company">[Company Name]</p>
        <hr>

        <p>Email: your-email@example.com</p>
        <p>Phone: (123) 456-7890</p>
        <a class="portfolio-link" href="www.google.com">Portfolio</a>
        <hr>


        <div class="social-media">
            <h2>Connect with me</h2>
            <a href="www.twitter.com">Twitter</a>, <a href="www.linkedin.com">LinkedIn</a>, <a href="www.github.com">GitHub</a>
        </div>


    </div>

</body>

</html>
