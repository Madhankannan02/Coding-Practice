<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To Do List</title>
  <link rel="stylesheet" href="styles.css">

  <style>
   body{
   font-family: Arial, sans-serif;
   padding:20px;
   }

   .todo-list{
   list-style:none;
   padding:0;
   }

   .sub-item{
   list-style:none;
   padding-left:20px;
   }

   .sub-item-link{
   text-decoration:none;
   }

   .sub-item-link:link{
   color:#1a73e8;
   }

   .sub-item-link:visited{
   color:#8e24aa;
   }

   .sub-item-link:hover{
   color:#e53935;
   }

   .sub-item-link:active{
   color:#188038;
   }

   .sub-item-link:focus{
   outline:2px solid #f9ab00;
   }
  </style>

</head>
<body>

  <ul class="todo-list">
    <li>
      <input type="checkbox" id="task1">
      <label for="task1">Complete HTML Practice</label>
      <ul class="sub-item">
        <li>
          <a href="https://developer.mozilla.org" class="sub-item-link" target="_blank">MDN Docs</a>
        </li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task2">
      <label for="task2">Practice CSS Selectors</label>
      <ul class="sub-item">
        <li>
          <a href="https://css-tricks.com" class="sub-item-link" target="_blank">CSS Tricks</a>
        </li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task3">
      <label for="task3">Build a Small Project</label>
      <ul class="sub-item">
        <li>
          <a href="https://github.com" class="sub-item-link" target="_blank">Repository</a>
        </li>
      </ul>
    </li>

    <li>
      <input type="checkbox" id="task4">
      <label for="task4">Learn Responsive Design</label>
      <ul class="sub-item">
        <li>
          <a href="https://freecodecamp.org" class="sub-item-link" target="_blank">freeCodeCamp</a>
        </li>
      </ul>
    </li>
  </ul>

</body>
</html>
