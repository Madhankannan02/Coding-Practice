<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
     /* Reset styles */
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      /* Fixed Navbar */
      #navbar {
          position: fixed;
          top: 0;
          width: 100%;
          background: #333;
          padding: 10px 0;
          text-align: center;
      }

      #navbar ul {
          list-style: none;
          display: flex;
          justify-content: center;
      }

      #navbar ul li {
          margin: 0 15px;
      }

      #navbar ul li a {
          color: white;
          text-decoration: none;
      }

      /* Welcome Section - Full viewport height */
      #welcome-section {
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: linear-gradient(45deg, #6a11cb, #2575fc);
          color: white;
          text-align: center;
      }

      /* Projects Section */
      #projects {
          padding: 50px;
          text-align: center;
      }

      .project-tile {
          background: #eee;
          padding: 20px;
          margin: 10px;
          display: inline-block;
      }

      /* Responsive Design (Media Query) */
      @media (max-width: 600px) {
          #navbar ul {
              flex-direction: column;
          }
          
          #navbar ul li {
              margin: 5px 0;
          }
          
          .project-tile {
              width: 100%;
          }
      }

    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav id="navbar">
        <ul>
            <li><a href="#welcome-section" class="nav-link">Home</a></li>
            <li><a href="#projects" class="nav-link">Projects</a></li>
            <li><a href="#contact" class="nav-link">Contact</a></li>
        </ul>
    </nav>

    <!-- Welcome Section -->
    <section id="welcome-section">
        <h1>Welcome to My Portfolio</h1>
    </section>

    <!-- Projects Section -->
    <section id="projects">
        <h2>My Projects</h2>
        <div class="project-tile">
            <a href="https://example.com/project1" target="_blank">Project 1</a>
        </div>
        <div class="project-tile">
            <a href="https://example.com/project2" target="_blank">Project 2</a>
        </div>
    </section>

    <!-- Profile Link -->
    <footer id="contact">
        <p>Find me on GitHub: 
            <a id="profile-link" href="https://github.com/yourprofile" target="_blank">GitHub Profile</a>
        </p>
    </footer>
</body>
</html>
