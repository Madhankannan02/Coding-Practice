<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moon Orbit</title>
  <link rel="stylesheet" href="styles.css">
  <Style>
   body {
     height: 100vh;
     display: flex;
     justify-content: center;
     align-items: center;
   }

   /* Space container */
   .space {
     width: 200px;
     height: 200px;
     position: relative;
   }

   /* Earth */
   .earth {
     width: 100px;
     height: 100px;
     background-color: blue;
     border-radius: 50%;

     position: absolute;
     top: 50%;
     left: 50%;
     transform: translate(-50%, -50%);
   }

   /* Orbit */
   .orbit {
     width: 200px;
     height: 200px;

     position: absolute;
     top: 50%;
     left: 50%;
     transform: translate(-50%, -50%);

     animation: orbit 5s linear infinite;
   }

   /* Moon */
   .moon {
     width: 30px;
     height: 30px;
     background-color: gray;
     border-radius: 50%;

     position: absolute;
     top: 0;
     left: 50%;
     transform: translateX(-50%);
   }

   /* Animation */
   @keyframes orbit {
     0% {
       transform: rotate(0deg) translate(-50%, -50%);
     }
     100% {
       transform: rotate(360deg) translate(-50%, -50%);
     }
   }
  </Style>
</head>
<body>

<div class="space">
  <div class="earth"></div>
  <div class="orbit">
    <div class="moon"></div>
  </div>
</div>

</body>
</html>
