<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multimedia Player</title>
</head>
<body>

    <h1>My Multimedia Player</h1>

    <section>
        <h2>Sailing Away</h2>
        <audio controls aria-label="Audio player for Sailing Away">
            <source src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3" type="audio/mpeg">
        </audio>
    </section>

    <section>
        <h2>Map Method Tutorial</h2>
        <video controls width="600" aria-label="Video explaining the map method">
            <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" type="video/mp4">
            <track src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt" kind="subtitles" srclang="en" label="English">
        </video>
    </section>

    <section>
        <h2>Transcript</h2>
        <p>This video explains how the map method works in JavaScript by iterating over an array and returning a new array with modified values.</p>
    </section>

</body>
</html>
