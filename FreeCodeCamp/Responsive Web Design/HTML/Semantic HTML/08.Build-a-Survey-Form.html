<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coding Experience Survey</title>
</head>
<body>
    <h1 id="title">Developer Insights Survey</h1>
    <p id="description">Help us understand the current landscape of web development.</p>

    <form id="survey-form">
        <label id="name-label" for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label id="email-label" for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label id="number-label" for="number">Years of Experience (optional)</label>
        <input type="number" id="number" min="0" max="99" placeholder="0">

        <label for="dropdown">Current Role:</label>
        <select id="dropdown">
            <option disabled selected value="">Select an option</option>
            <option value="student">Student</option>
            <option value="professional">Professional Developer</option>
            <option value="hobbyist">Hobbyist</option>
        </select>

        <p>Would you recommend coding to a friend?</p>
        <label>
            <input type="radio" name="recommend" value="definitely" checked> Definitely
        </label>
        <label>
            <input type="radio" name="recommend" value="maybe"> Maybe
        </label>

        <p>What languages do you know? (Check all that apply)</p>
        <label>
            <input type="checkbox" name="languages" value="html"> HTML
        </label>
        <label>
            <input type="checkbox" name="languages" value="css"> CSS
        </label>
        <label>
            <input type="checkbox" name="languages" value="js"> JavaScript
        </label>

        <p>Any additional comments?</p>
        <textarea id="comments" placeholder="Tell us more..."></textarea>

        <button type="submit" id="submit">Submit Survey</button>
    </form>
</body>
</html>
